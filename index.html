<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goat Conut AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:      #0f1a0f;
            --surface: #162116;
            --card:    #1d2e1d;
            --border:  #2a3f2a;
            --green:   #4ade80;
            --amber:   #fbbf24;
            --red:     #f87171;
            --text:    #e2f5e2;
            --muted:   #6b8f6b;
        }
        body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }

        /* ── HEADER ── */
        header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 32px; height: 32px; background: var(--green); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 17px; }
        .logo-text { font-size: 1rem; font-weight: 800; }
        .logo-sub  { font-size: .58rem; color: var(--muted); font-family: 'Space Mono', monospace; }
        #pill { padding: 4px 10px; border-radius: 999px; font-family: 'Space Mono', monospace; font-size: .58rem; font-weight: 700; letter-spacing: .05em; background: var(--card); border: 1px solid var(--border); color: var(--muted); transition: all .3s; white-space: nowrap; }
        #pill.loading { color: var(--amber); border-color: var(--amber); }
        #pill.ok      { color: var(--green); border-color: var(--green); animation: pulse 2s infinite; }
        #pill.error   { color: var(--red);   border-color: var(--red); }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,.4)} 50%{box-shadow:0 0 0 5px rgba(74,222,128,0)} }

        /* ── VIDEO ── */
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #wrap { position: relative; background: #000; flex-shrink: 0; line-height: 0; }
        #vid  { display: block; width: 100%; max-height: 52dvh; object-fit: contain; }
        #cvs  { position: absolute; top: 0; left: 0; pointer-events: none; }

        /* badges */
        #badge-count { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,.72); backdrop-filter: blur(6px); border: 1.5px solid var(--green); border-radius: 10px; padding: 5px 13px; display: flex; flex-direction: column; align-items: center; }
        #badge-count .n { font-size: 2.6rem; font-weight: 800; color: var(--green); font-family: 'Space Mono', monospace; line-height: 1; transition: transform .15s; }
        #badge-count .n.bump { transform: scale(1.3); }
        #badge-count .l { font-size: .46rem; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; font-family: 'Space Mono', monospace; }
        .badge { background: rgba(0,0,0,.6); backdrop-filter: blur(4px); border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; font-family: 'Space Mono', monospace; font-size: .54rem; color: var(--muted); }
        #badge-fps { position: absolute; top: 10px; right: 10px; }
        #badge-dbg { position: absolute; bottom: 8px; left: 8px; max-width: 65%; }
        #badge-mdl { position: absolute; bottom: 8px; right: 8px; }

        /* ── CONTROLES ── */
        #controls { background: var(--surface); border-top: 1px solid var(--border); padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
        .cg { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 110px; }
        .cl { font-family: 'Space Mono', monospace; font-size: .52rem; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }
        .cv { font-family: 'Space Mono', monospace; font-size: .66rem; color: var(--green); }
        input[type=range] { width: 100%; accent-color: var(--green); height: 4px; }
        #btn-save { background: var(--green); color: #0f1a0f; font-family: 'Syne', sans-serif; font-weight: 800; font-size: .8rem; border: none; border-radius: 10px; padding: 10px 15px; cursor: pointer; flex-shrink: 0; white-space: nowrap; }

        /* ── LOG ── */
        #log-wrap { flex: 1; overflow-y: auto; padding: 10px 14px; }
        #log-ttl  { font-family: 'Space Mono', monospace; font-size: .54rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; }
        #log { list-style: none; display: flex; flex-direction: column; gap: 6px; }
        #log li { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; animation: si .2s ease; }
        @keyframes si { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
        .ln { font-family: 'Space Mono', monospace; font-weight: 700; color: var(--green); font-size: 1rem; }
        .lt { font-family: 'Space Mono', monospace; font-size: .54rem; color: var(--muted); }
        #log-empty { font-family: 'Space Mono', monospace; font-size: .64rem; color: var(--muted); text-align: center; padding: 18px 0; }

        /* ── TOAST ── */
        #toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: #1a2e1a; border: 1px solid var(--green); color: var(--green); font-family: 'Space Mono', monospace; font-size: .68rem; padding: 10px 18px; border-radius: 8px; display: none; z-index: 300; text-align: center; max-width: 88vw; }
        #toast.err { background: #2e1a1a; border-color: var(--red); color: var(--red); }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-icon">🐐</div>
        <div>
            <div class="logo-text">Goat Conut AI</div>
            <div class="logo-sub">YOLOv8 · Python · Render.com</div>
        </div>
    </div>
    <div id="pill" class="loading">⏳ INICIANDO</div>
</header>

<main>
    <div id="wrap">
        <video id="vid" autoplay playsinline muted></video>
        <canvas id="cvs"></canvas>
        <div id="badge-count">
            <span class="n" id="counter">0</span>
            <span class="l">cabras</span>
        </div>
        <div id="badge-fps" class="badge">-- fps</div>
        <div id="badge-dbg" class="badge">iniciando…</div>
        <div id="badge-mdl" class="badge">--</div>
    </div>

    <div id="controls">
        <div class="cg">
            <span class="cl">Confianza: <span class="cv" id="v-conf">0.35</span></span>
            <input type="range" id="sl-conf" min="0.10" max="0.90" step="0.05" value="0.35">
        </div>
        <div class="cg">
            <span class="cl">Suavizado: <span class="cv" id="v-smooth">8</span> frames</span>
            <input type="range" id="sl-smooth" min="1" max="30" step="1" value="8">
        </div>
        <button id="btn-save" onclick="saveCount()">💾 GUARDAR</button>
    </div>

    <div id="log-wrap">
        <div id="log-ttl">📋 Historial de conteos</div>
        <ul id="log"></ul>
        <div id="log-empty">Presiona GUARDAR para registrar un conteo</div>
    </div>
</main>
<div id="toast"></div>

<script>
/* ════════════════════════════════
   CONFIG — se reemplaza por Flask
════════════════════════════════ */
const SERVER_URL = window.location.origin; // mismo servidor
let CONF   = 0.35;
let SMOOTH = 8;

let vid, cvs, ctx;
let countHistory = [];
let prevCount    = 0;
let fpsSmooth    = 0;
let lastFpsTs    = performance.now();
let sending      = false;
let lastErrTs    = 0;

/* ════════════════════════════════
   INIT
════════════════════════════════ */
async function init() {
    vid = document.getElementById('vid');
    cvs = document.getElementById('cvs');
    ctx = cvs.getContext('2d');

    // Verificar que el servidor está listo
    try {
        const h = await fetch(SERVER_URL + '/health').then(r => r.json());
        dbg(`servidor OK · ${h.model_type}`);
        document.getElementById('badge-mdl').textContent = h.model_type;
    } catch(e) {
        toast('No se puede conectar al servidor', true);
        setPill('error', '❌ SERVIDOR');
        return;
    }

    await startCamera();
    setPill('ok', '🐐 DETECTANDO');
    requestAnimationFrame(fpsLoop);
    detectLoop();
}

/* ════════════════════════════════
   CÁMARA
════════════════════════════════ */
async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' }, width: { ideal: 640 }, height: { ideal: 480 } }
        });
        vid.srcObject = stream;

        await new Promise(res => {
            vid.onloadedmetadata = () => vid.play().then(res).catch(res);
            setTimeout(res, 5000);
        });

        for (let i = 0; i < 30 && !vid.videoWidth; i++) await sleep(100);

        syncCanvas();
        window.addEventListener('resize', syncCanvas);
        dbg(`cámara OK · ${vid.videoWidth}×${vid.videoHeight}`);

    } catch(e) {
        setPill('error', '❌ CÁMARA');
        toast('Cámara: ' + e.message, true);
        throw e;
    }
}

function syncCanvas() {
    cvs.width  = vid.videoWidth  || 640;
    cvs.height = vid.videoHeight || 480;
    requestAnimationFrame(() => {
        const vr = vid.getBoundingClientRect();
        const wr = vid.parentElement.getBoundingClientRect();
        cvs.style.width  = vr.width  + 'px';
        cvs.style.height = vr.height + 'px';
        cvs.style.left   = (vr.left - wr.left) + 'px';
        cvs.style.top    = (vr.top  - wr.top)  + 'px';
    });
}

/* ════════════════════════════════
   DETECTION LOOP
   Captura frame → envía al servidor Python
   → recibe detecciones → dibuja
════════════════════════════════ */
async function detectLoop() {
    while (true) {
        if (!sending && vid.videoWidth && vid.readyState >= 2) {
            sending = true;
            try {
                // Capturar frame como JPEG base64
                const tmp = document.createElement('canvas');
                tmp.width  = vid.videoWidth;
                tmp.height = vid.videoHeight;
                tmp.getContext('2d').drawImage(vid, 0, 0);
                const b64 = tmp.toDataURL('image/jpeg', 0.80);

                // POST al servidor Python
                const resp = await fetch(`${SERVER_URL}/detect?confidence=${CONF}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: b64 })
                });

                if (resp.ok) {
                    const data = await resp.json();
                    render(data.predictions || [], data.image);
                    if (document.getElementById('pill').classList.contains('error')) {
                        setPill('ok', '🐐 DETECTANDO');
                    }
                } else {
                    throttleErr('Servidor: HTTP ' + resp.status);
                }

            } catch(e) {
                throttleErr('Red: ' + e.message);
            }
            sending = false;
        }
        await sleep(350); // ~3 inferencias por segundo
    }
}

/* ════════════════════════════════
   RENDER
════════════════════════════════ */
function render(preds, imgSize) {
    ctx.clearRect(0, 0, cvs.width, cvs.height);

    // El servidor devuelve coords en píxeles de la imagen original
    // El canvas interno tiene el mismo tamaño → sin escala extra
    const scaleX = imgSize ? cvs.width  / imgSize.width  : 1;
    const scaleY = imgSize ? cvs.height / imgSize.height : 1;

    for (const p of preds) {
        const x = (p.x - p.width  / 2) * scaleX;
        const y = (p.y - p.height / 2) * scaleY;
        const w = p.width  * scaleX;
        const h = p.height * scaleY;
        const pct = Math.round(p.confidence * 100);

        // Box
        ctx.strokeStyle = '#4ade80';
        ctx.lineWidth   = 3;
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, 6);
        ctx.stroke();

        // Esquinas
        drawCorners(x, y, w, h, '#4ade80', 15);

        // Etiqueta
        const lbl = `🐐 ${pct}%`;
        ctx.font = 'bold 14px monospace';
        const tw = ctx.measureText(lbl).width + 16;
        ctx.fillStyle = 'rgba(74,222,128,0.88)';
        ctx.beginPath();
        ctx.roundRect(x, y - 26, tw, 24, 4);
        ctx.fill();
        ctx.fillStyle = '#0f1a0f';
        ctx.fillText(lbl, x + 8, y - 8);

        // Barra de confianza
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(x, y + h - 5, w, 5);
        ctx.fillStyle = '#4ade80';
        ctx.fillRect(x, y + h - 5, w * p.confidence, 5);
    }

    dbg(`YOLOv8 · ${preds.length} det · ${cvs.width}×${cvs.height}`);

    // Estabilización con mediana
    countHistory.push(preds.length);
    if (countHistory.length > SMOOTH) countHistory.shift();
    const stable = mediana(countHistory);

    const el = document.getElementById('counter');
    if (stable !== prevCount) {
        el.textContent = stable;
        el.classList.add('bump');
        setTimeout(() => el.classList.remove('bump'), 200);
        prevCount = stable;
    }
}

function drawCorners(x, y, w, h, color, cs) {
    ctx.strokeStyle = color; ctx.lineWidth = 2.5;
    [[x,y,x+cs,y],[x,y,x,y+cs],
     [x+w,y,x+w-cs,y],[x+w,y,x+w,y+cs],
     [x,y+h,x+cs,y+h],[x,y+h,x,y+h-cs],
     [x+w,y+h,x+w-cs,y+h],[x+w,y+h,x+w,y+h-cs]
    ].forEach(([x1,y1,x2,y2]) => {
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    });
}

/* ════════════════════════════════
   FPS
════════════════════════════════ */
function fpsLoop(ts) {
    const dt = ts - lastFpsTs; lastFpsTs = ts;
    if (dt > 0) fpsSmooth = fpsSmooth * 0.85 + (1000/dt) * 0.15;
    document.getElementById('badge-fps').textContent = Math.round(fpsSmooth) + ' fps';
    requestAnimationFrame(fpsLoop);
}

/* ════════════════════════════════
   CONTROLES
════════════════════════════════ */
document.getElementById('sl-conf').addEventListener('input', function() {
    CONF = parseFloat(this.value);
    document.getElementById('v-conf').textContent = CONF.toFixed(2);
});
document.getElementById('sl-smooth').addEventListener('input', function() {
    SMOOTH = parseInt(this.value);
    document.getElementById('v-smooth').textContent = SMOOTH;
    if (countHistory.length > SMOOTH) countHistory = countHistory.slice(-SMOOTH);
});

/* ════════════════════════════════
   GUARDAR
════════════════════════════════ */
function saveCount() {
    const num  = document.getElementById('counter').textContent;
    const t    = new Date();
    const time = t.toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const date = t.toLocaleDateString('es-MX');
    document.getElementById('log-empty')?.remove();
    const li = document.createElement('li');
    li.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px">
            <span class="ln">${num}</span>
            <span style="font-size:.75rem">cabras detectadas</span>
        </div>
        <span class="lt">${date} · ${time}</span>`;
    document.getElementById('log').prepend(li);
    toast('✅ Guardado: ' + num + ' cabras');
    const btn = document.getElementById('btn-save');
    btn.textContent = '✅ GUARDADO';
    setTimeout(() => btn.textContent = '💾 GUARDAR', 1500);
}

/* ════════════════════════════════
   HELPERS
════════════════════════════════ */
function setPill(cls, txt) { const p = document.getElementById('pill'); p.className = cls; p.textContent = txt; }
let _tt;
function toast(msg, err=false) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = err ? 'err' : ''; t.style.display = 'block';
    clearTimeout(_tt); _tt = setTimeout(() => t.style.display='none', 5000);
}
function dbg(msg) { document.getElementById('badge-dbg').textContent = msg; }
function throttleErr(msg) {
    if (Date.now() - lastErrTs > 8000) { lastErrTs = Date.now(); toast(msg, true); setPill('error', '❌ ERROR'); }
}
function mediana(arr) {
    if (!arr.length) return 0;
    const s = [...arr].sort((a,b)=>a-b);
    const m = Math.floor(s.length/2);
    return s.length%2 ? s[m] : Math.round((s[m-1]+s[m])/2);
}
function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

// Arrancar
init();
</script>
</body>
</html>
